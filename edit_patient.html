<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient Profile Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
   <div class="header">
            <div class="header-left">
                <div class="logo-section">
                <div class="logo-icon"><a href="/" class="active"><i class="bi bi-heart-pulse-fill"></i></div>
                 <div class="logo-text">
                    <a href="/" class="active"><h2 class="clinical-glow-text">MIRA AI</h2><p>HEALTH SYSTEMS</p></a>                    
                </div>
            </div>
            <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>
        </div>
        <div class="header-right-group" id="headerRightGroup">       
          <div class="header-buttons">
                <a href="/add_patient"><i class="bi bi-person-plus-fill"></i> Add Patient</a>
                <a href="/reports" class="active"><i class="bi bi-bar-chart-fill"></i> Reports</a>
         </div>
            </div>
        </div>
    <div class="main-content">
        <div class="container-fluid m-0 p-0">
            <div class="card shadow border-0 p-5 rounded-4">
                <div class="mb-4">
                    <h3 class="fw-bold text-dark"><i class="bi bi-pencil-square text-warning me-2"></i>Modify Existing Patient Lab Values</h3>
                </div>
              <form action="/edit/{{ patient.id }}" method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary">Full Legal Name</label>
                            <input type="text" name="full_name" class="form-control" value="{{ patient.full_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary">Date of Birth</label>
                            <input type="date" name="date_of_birth" class="form-control" value="{{ patient.date_of_birth }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary">Email Address</label>
                            <input type="email" name="email" class="form-control" value="{{ patient.email }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" value="{{ patient.phone }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold text-secondary">Glucose Index (mg/dL)</label>
                            <input type="number" step="0.1" min="0" name="glucose" id="glucose" class="form-control" value="{{ patient.glucose }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold text-secondary">Cholesterol Count (mg/dL)</label>
                            <input type="number" step="0.1" min="0" name="cholesterol" id="cholesterol" class="form-control" value="{{ patient.cholesterol }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold text-secondary">Haemoglobin Density (g/dL)</label>
                            <input type="number" step="0.1" min="0" name="haemoglobin" id="haemoglobin" class="form-control" value="{{ patient.haemoglobin }}" required>
                        </div>
                           <div class="col-12">
                              <label class="form-label fw-semibold text-secondary">AI Diagnosis Health Remarks</label>
                             <textarea name="remarks" id="remarks" class="form-control" rows="3" readonly></textarea>
                            </div> 
                        </div>
                    <div class="d-flex gap-3 mt-5">
                        <button type="submit" class="btn btn-warning px-5 fw-bold py-2 text-dark shadow-sm"><i class="bi bi-check-circle-fill me-2"></i>Update Record</button>
                        <a href="/" class="btn btn-outline-secondary px-4 py-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
<footer class="footer-section">
    <div class="footer-left">
        <p>
            © 2026 <strong>MIRA AI Health Systems</strong>.
            All clinical parameters encrypted.
        </p>
    </div>
    <div class="footer-right">
        <a href="/" class="footer-link">
            <i class="bi bi-house-fill"></i> Home
        </a>
        <a href="/privacy" class="footer-link">
            <i class="bi bi-shield-lock-fill"></i> Privacy Policy
        </a>
        <span class="status">
            <span class="status-dot"></span>
            Operational
        </span>
    </div>
</footer>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
