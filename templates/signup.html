<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create System Credentials</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-wrapper">
    <div class="card auth-card p-4 shadow">
        <h3 class="text-center fw-bold text-primary mb-1">Registration</h3>
        <p class="text-center text-muted small mb-4">Create admin credentials to unlock registration forms</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="alert alert-danger p-2 small text-center">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/signup" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-semibold">Choose Username</label>
                <input type="text" name="username" class="form-control" required autocomplete="off">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-semibold">Secure Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Register Account</button>
            <div class="text-center small">Already a user? <a href="/login" class="text-decoration-none">Sign In</a></div>
            <div class="text-center small mt-2"><a href="/" class="text-muted text-decoration-none">← Cancel & Return</a></div>
        </form>
    </div>
</body>
</html>
