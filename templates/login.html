<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-wrapper">
    <div class="card auth-card p-4 shadow">
        <h3 class="text-center fw-bold text-success mb-1">Sign In</h3>
        <p class="text-center text-muted small mb-4">Provide credentials to unlock modifications</p>

        <!-- {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="alert alert-danger p-2 small text-center">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %} -->
        {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, msg in messages %}
            <div class="alert alert-success p-2 small text-center border-0" style="background-color: #c5e4d6; color: #0f5132; border-radius: 10px;">
                {{ msg }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" required autocomplete="off">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2 mb-3">Authenticate Access</button>
            <div class="text-center small">New operator? <a href="/signup" class="text-decoration-none">Create Account</a></div>
            <div class="text-center small mt-2"><a href="/" class="text-muted text-decoration-none">← Cancel & Return</a></div>
        </form>
    </div>
</body>
</html>
